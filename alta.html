    <main>
        <div class="encabezado_seccion">
            <h2>¡Date de alta!</h3>
        </div>
        <div>
            <form action="" method="get">
                <div>
                    <label for="nombre">Nombre*:</label>
                    <input type="text" name="nombre" required>
                    <label for="nombre">Apellido*:</label>
                    <input type="text" name="apellido" required>
                </div>
                <div>
                    <label for="correo">Correo electronico*:</label>
                    <input type="email" name="email" required>
                    <label for="password">Contraseña nueva*:</label>
                    <input type="password" name="password" required>

                </div>
                <div>
                    <label for="fechaNacimiento">Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNacimiento" name="fechaNacimiento">
                    <label for="nombre">Teléfono :</label>
                    <input type="tel" name="Telefono" required>
                </div>
                <div>
                    <span>¿Qué eres?</span>
                    <div>
                        <label for="opcion1">Oyente</label><br>
                        <input type="checkbox" id="opcion1" name="opcion1" value="oyente">
                        <label for="opcion2">Músico</label><br>
                        <input type="checkbox" id="opcion2" name="opcion2" value="musico">
                    </div>
                    <label for="opciones">¿Cómo nos conociste?:</label>
                    <select id="opciones" name="opciones">
                        <option value="opcion1">Google</option>
                        <option value="opcion2">Amigo/colega</option>
                        <option value="opcion3">Red social</option>
                    </select>
                </div>
                <div id="boton">
                    <button class="boton" type="submit">Enviar</button>
                </div>

            </form>
            <img src="src/imatges/gary_moore.jpg" alt="">
